<div class="container">
  <h1>Usuários</h1>

  <div class="toolbar">
    <mat-form-field appearance="outline">
      <mat-label>Pesquisar</mat-label>
      <input matInput [(ngModel)]="termoBusca" (input)="filtrar()" placeholder="Nome ou e-mail">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="novo()">
      <mat-icon>add</mat-icon> Novo Usuário
    </button>
  </div>

  <div class="spinner-container" *ngIf="carregando">
    <mat-spinner></mat-spinner>
  </div>

  <table mat-table [dataSource]="usuariosFiltrados" *ngIf="!carregando">

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let u">{{ u.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>E-mail</th>
      <td mat-cell *matCellDef="let u">{{ u.email }}</td>
    </ng-container>

    <ng-container matColumnDef="telefone">
      <th mat-header-cell *matHeaderCellDef>Telefone</th>
      <td mat-cell *matCellDef="let u">{{ u.telefone }}</td>
    </ng-container>

<ng-container matColumnDef="acoes">
  <th mat-header-cell *matHeaderCellDef>Ações</th>
  <td mat-cell *matCellDef="let u">
    <button mat-icon-button color="accent" (click)="visualizar(u.id)" title="Visualizar">
      <mat-icon>visibility</mat-icon>
    </button>
    <button mat-icon-button color="primary" (click)="editar(u.id)" title="Editar">
      <mat-icon>edit</mat-icon>
    </button>
    <button mat-icon-button color="warn" (click)="deletar(u.id)" title="Deletar">
      <mat-icon>delete</mat-icon>
    </button>
  </td>
</ng-container>

    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
  </table>

  <p *ngIf="!carregando && usuariosFiltrados.length === 0">
    Nenhum usuário encontrado.
  </p>
</div>
