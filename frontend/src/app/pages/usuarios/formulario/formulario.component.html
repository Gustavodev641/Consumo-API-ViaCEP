<div class="container">
  <div *ngIf="carregando" class="spinner-overlay">
    <mat-spinner></mat-spinner>
  </div>

  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ modoEdicao ? 'Editar Usuário' : 'Novo Usuário' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form #form="ngForm" (ngSubmit)="salvar()">

        <!-- DADOS DO USUÁRIO -->
        <h3 class="section-title">Dados do Usuário</h3>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nome</mat-label>
          <input matInput [(ngModel)]="usuario.nome" name="nome" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput [(ngModel)]="usuario.email" name="email" type="email" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Telefone</mat-label>
          <input matInput [(ngModel)]="usuario.telefone" name="telefone" required />
        </mat-form-field>

        <mat-divider></mat-divider>

        <!-- ENDEREÇO -->
        <h3 class="section-title">Endereço</h3>

        <div class="cep-row">
          <mat-form-field appearance="outline" class="cep-field">
            <mat-label>CEP</mat-label>
            <input matInput [(ngModel)]="endereco.cep" name="cep" required maxlength="9" />
          </mat-form-field>

          <button mat-stroked-button type="button" (click)="buscarCep()" [disabled]="buscandoCep">
            <mat-spinner *ngIf="buscandoCep" diameter="20"></mat-spinner>
            <span *ngIf="!buscandoCep">Buscar CEP</span>
          </button>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Rua</mat-label>
          <input matInput [(ngModel)]="endereco.rua" name="rua" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Número</mat-label>
          <input matInput [(ngModel)]="endereco.numero" name="numero" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Bairro</mat-label>
          <input matInput [(ngModel)]="endereco.bairro" name="bairro" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Cidade</mat-label>
          <input matInput [(ngModel)]="endereco.cidade" name="cidade" required />
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Estado</mat-label>
          <input matInput [(ngModel)]="endereco.estado" name="estado" required maxlength="2" />
        </mat-form-field>

        <!-- BOTÕES -->
        <div class="actions">
          <button mat-stroked-button type="button" (click)="voltar()">
            <mat-icon>arrow_back</mat-icon> Voltar
          </button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || carregando">
            <mat-icon>save</mat-icon> Salvar
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
